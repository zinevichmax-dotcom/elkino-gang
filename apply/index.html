const TextArea = ({ label, hint, required, value, onChange, placeholder, rows = 2, maxLength }) => {
  const charCount = (value || "").length;
  const atLimit = maxLength && charCount >= maxLength;
  const textRef = useRef(null);
  useEffect(() => {
    if (textRef.current) {
      textRef.current.style.height = "auto";
      textRef.current.style.height = textRef.current.scrollHeight + "px";
    }
  }, [value]);
  const handleChange = (e) => {
    const v = e.target.value;
    if (maxLength && v.length > maxLength) return;
    onChange(v);
  };
  return (
    <div style={{ marginBottom: 20 }}>
      <label style={{
        display: "block", fontFamily: "Unbounded", fontSize: 13,
        fontWeight: 500, color: C.text, marginBottom: 6,
      }}>
        {label} {required && <span style={{ color: C.accent }}>*</span>}
      </label>
      {hint && <p style={{
        fontFamily: "Inter", fontSize: 12, color: C.textDim,
        margin: "0 0 8px", lineHeight: 1.4,
      }}>{hint}</p>}
      <textarea
        ref={textRef}
        value={value} onChange={handleChange}
        placeholder={placeholder || ""} rows={rows}
        style={{
          width: "100%", padding: "12px 14px", fontFamily: "Inter",
          fontSize: 14, color: C.text, background: C.card,
          border: `1px solid ${atLimit ? C.accent : C.border}`, borderRadius: 8,
          outline: "none", resize: "none", transition: "border-color 0.2s",
          boxSizing: "border-box", overflow: "hidden",
        }}
        onFocus={e => e.target.style.borderColor = C.accent}
        onBlur={e => e.target.style.borderColor = atLimit ? C.accent : C.border}
      />
      {maxLength && (
        <div style={{
          fontFamily: "Inter", fontSize: 11, marginTop: 4, textAlign: "right",
          color: atLimit ? C.accent : C.textMuted,
        }}>{charCount} / {maxLength}</div>
      )}
    </div>
  );
};

        <button key={opt} type="button" onClick={() => onChange(value === opt ? "" : opt)}

            fontWeight: value === opt ? 600 : 400,

        >{opt}</button>
      ))}
    </div>
  </div>
);

const CheckGroupWithOther = ({ label, hint, required, options, value = [], onChange, otherValue, onOtherChange }) => {
  const hasOther = options.includes("Other") || options.includes("Другое");
  const otherKey = options.includes("Other") ? "Other" : "Другое";
  const otherSelected = value.includes(otherKey);
  const toggle = (opt) => {
    onChange(value.includes(opt) ? value.filter(v => v !== opt) : [...value, opt]);
  };
  return (
    <div style={{ marginBottom: 20 }}>
      <label style={{
        display: "block", fontFamily: "Unbounded", fontSize: 13,
        fontWeight: 500, color: C.text, marginBottom: 6,
      }}>
        {label} {required && <span style={{ color: C.accent }}>*</span>}
      </label>
      {hint && <p style={{
        fontFamily: "Inter", fontSize: 12, color: C.textDim,
        margin: "0 0 8px", lineHeight: 1.4,
      }}>{hint}</p>}
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
        {options.map(opt => {
          const sel = value.includes(opt);
          return (
            <button key={opt} type="button" onClick={() => toggle(opt)}
              style={{
                padding: "6px 12px", fontFamily: "Inter", fontSize: 12,
                fontWeight: sel ? 600 : 400,
                color: sel ? C.bg : C.textDim,
                background: sel ? C.accent : C.bg,
                border: `1px solid ${sel ? C.accent : C.border}`,
                borderRadius: 6, cursor: "pointer", transition: "all 0.2s",
              }}
            >{opt}</button>
          );
        })}
      </div>
      {hasOther && otherSelected && (
        <input
          type="text" value={otherValue || ""} onChange={e => onOtherChange(e.target.value)}
          placeholder="Укажи свой вариант"
          style={{

          onBlur={e => e.target.style.borderColor = C.border}
        />
      )}
    </div>
  );
};

const FileUpload = ({ label, hint, required, fileName, onChange }) => {
  const inputRef = useRef(null);
  const [displayName, setDisplayName] = useState(fileName || "");
  return (
    <div style={{ marginBottom: 20 }}>
      <label style={{
        display: "block", fontFamily: "Unbounded", fontSize: 13,
        fontWeight: 500, color: C.text, marginBottom: 6,

        const file = e.target.files && e.target.files[0];

const EnergySlider = ({ label, hint, required, value, onChange }) => {
  const val = value || 5;
  const pct = ((val - 1) / 9) * 100;
  const getColor = (v) => {
    const r = Math.round(40 + (255 - 40) * ((v - 1) / 9));
    const g = Math.round(200 - 140 * ((v - 1) / 9));
    const b = Math.round(100 - 100 * ((v - 1) / 9));
    return `rgb(${r},${g},${b})`;
  };
  const color = getColor(val);
  return (
    <div style={{ marginBottom: 24 }}>
      <label style={{
        display: "block", fontFamily: "Unbounded", fontSize: 13,
        fontWeight: 500, color: C.text, marginBottom: 6,

      {hint && <p style={{

        margin: "0 0 12px", lineHeight: 1.4,
      }}>{hint}</p>}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        marginBottom: 8,
      }}>
        <span style={{ fontFamily: "Inter", fontSize: 11, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.05em" }}>Ambient</span>
        <span style={{
          fontFamily: "Unbounded", fontSize: 22, fontWeight: 800,
          color, transition: "color 0.2s", minWidth: 36, textAlign: "center",
        }}>{val}</span>
        <span style={{ fontFamily: "Inter", fontSize: 11, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.05em" }}>Полный газ</span>
      </div>
      <div style={{ position: "relative", height: 36, display: "flex", alignItems: "center" }}>
        <style>{`
          input[type="range"].energy-slider { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 3px; outline: none; cursor: pointer;
            background: linear-gradient(to right, ${color} 0%, ${color} ${pct}%, ${C.border} ${pct}%, ${C.border} 100%); }
          input[type="range"].energy-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%;
            background: ${color}; border: 2px solid ${C.bg}; box-shadow: 0 0 8px ${color}44; cursor: pointer; transition: all 0.15s; }
          input[type="range"].energy-slider::-webkit-slider-thumb:hover { transform: scale(1.2); box-shadow: 0 0 14px ${color}66; }
          input[type="range"].energy-slider::-moz-range-thumb { width: 22px; height: 22px; border-radius: 50%;
            background: ${color}; border: 2px solid ${C.bg}; box-shadow: 0 0 8px ${color}44; cursor: pointer; }
        `}</style>

          style={{ width: "100%" }}

        {[...Array(10)].map((_, i) => (

const PhoneInput = ({ label, hint, required, value, onChange }) => {
  const getDigits = (v) => (v || "").replace(/\D/g, "").replace(/^[78]/, "");
  const formatPhone = (digits) => {
    let f = "+7";
    if (digits.length > 0) f += " (" + digits.substring(0, 3);
    if (digits.length >= 3) f += ") " + digits.substring(3, 6);
    if (digits.length >= 6) f += "-" + digits.substring(6, 8);
    if (digits.length >= 8) f += "-" + digits.substring(8, 10);
    return f;
  };
  const prevDigitsRef = useRef("");
  const handleChange = (e) => {
    const raw = e.target.value;
    if (raw.length <= 2) { onChange("+7"); prevDigitsRef.current = ""; return; }
    let digits = getDigits(raw).substring(0, 10);
    // If digit count didn't change but string got shorter = user deleted a formatting char → drop one more digit
    if (digits.length === prevDigitsRef.current.length && raw.length < (value || "").length && digits.length > 0) {
      digits = digits.slice(0, -1);
    }
    prevDigitsRef.current = digits;
    onChange(formatPhone(digits));
  };
  return (
    <div style={{ marginBottom: 20 }}>
      <label style={{
        display: "block", fontFamily: "Unbounded", fontSize: 13,
        fontWeight: 500, color: C.text, marginBottom: 6,
      }}>
        {label} {required && <span style={{ color: C.accent }}>*</span>}
      </label>
      {hint && <p style={{
        fontFamily: "Inter", fontSize: 12, color: C.textDim,
        margin: "0 0 8px", lineHeight: 1.4,
      }}>{hint}</p>}
      <input
        type="tel" value={value || "+7"} onChange={handleChange}
        placeholder="+7 (999) 123-45-67"
        onFocus={e => { if (!e.target.value) onChange("+7"); e.target.style.borderColor = C.accent; }}
        onBlur={e => e.target.style.borderColor = C.border}
        style={{
          width: "100%", padding: "12px 14px", fontFamily: "Inter",
          fontSize: 14, color: C.text, background: C.card,
          border: `1px solid ${C.border}`, borderRadius: 8,
          outline: "none", transition: "border-color 0.2s", boxSizing: "border-box",
        }}
      />
    </div>
  );
};

const pluralize = (n, one, two, five) => {
  const abs = Math.abs(n) % 100;
  const last = abs % 10;
  if (abs > 10 && abs < 20) return five;
  if (last > 1 && last < 5) return two;
  if (last === 1) return one;
  return five;
};

const Countdown = () => {
  const deadline = new Date("2026-05-15T23:59:59").getTime();
  const [now, setNow] = useState(Date.now());
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, []);

  const diff = Math.max(0, deadline - now);
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);

      { agree: "Согласие с правилами" },
    ];
    const r = rules[step];
    for (const [k, label] of Object.entries(r)) {
      const val = d[k];
      if (Array.isArray(val) ? val.length === 0 : isEmpty(val)) {
        setError(`Заполни поле «${label}»`);
        return false;

const ActivityForm = ({ onBack, onSubmit }) => {
  const [d, setD] = useState({});
  const [step, setStep] = useState(0);
  const [error, setError] = useState("");
  const [showExit, setShowExit] = useState(false);
  const s = (k, v) => { setD(p => ({ ...p, [k]: v })); if (error) setError(''); };
  const topRef = useRef(null);
  useEffect(() => { topRef.current?.scrollIntoView({ behavior: "smooth" }); }, [step]);

  const timeSlots = [
    "10:00 – 12:00", "12:00 – 14:00", "14:00 – 16:00",
    "16:00 – 18:00", "18:00 – 20:00", "20:00 – 22:00", "Весь день",
  ];
  const stepLabels = ["О тебе", "Твоя активность", "Детали", "Финал"];
  const isEmpty = (v) => !v || (typeof v === "string" && (v.trim() === "" || v === "+7" || v === "@"));
  const isPhoneComplete = (v) => (v || "").replace(/\D/g, "").length >= 11;

  const validateStep = () => {
    const rules = [
      { name: "Имя и фамилия", telegram: "Telegram", bio: "О себе как организаторе" },
      { title: "Название активности", description: "Описание активности", whyElkino: "Почему подходит для Elkino" },
      { duration: "Длительность", date: "Желаемая дата", time: "Желаемое время", capacity: "Макс. участников", autonomous: "Работает без ведущего" },
      { needs: "Что нужно от нас", agree: "Согласие с правилами" },
    ];
    const arrayRules = [
      {},
      { type: "Тип активности" },
      {},
      {},
    ];
    const r = rules[step];
    for (const [k, label] of Object.entries(r)) {
      const val = d[k];
      if (Array.isArray(val) ? val.length === 0 : isEmpty(val)) {
        setError(`Заполни поле «${label}»`);
        return false;
      }
    }
    const ar = arrayRules[step];
    for (const [k, label] of Object.entries(ar)) {
      if (!d[k] || d[k].length === 0) { setError(`Заполни поле «${label}»`); return false; }
    }
    if (step === 0 && !isPhoneComplete(d.phone)) {
      setError("Введи полный номер телефона");
      return false;
    }
    return true;
  };

  const next = () => { if (validateStep()) { setStep(s => s + 1); setError(""); } };
  const back = () => { setStep(s => s - 1); setError(""); };

    if (step === 0) {

        const v = d[k];

        if (v === "+7" || v === "@") return false;
        if (Array.isArray(v) && v.length === 0) return false;
        if (typeof v === "string" && v.trim() === "") return false;
        return true;

      onBack();
    } else back();

      borderRadius: 10, cursor: "pointer", transition: "all 0.2s",
      boxShadow: primary ? `0 4px 20px ${C.accentGlow}` : "none",
    }}
      onMouseEnter={e => { if (primary) e.target.style.transform = "translateY(-2px)"; else e.target.style.borderColor = C.borderHover; }}

              }}>Выйти</button>
            </div>
          </div>
        </div>

      <button onClick={handleBack} style={{

        {step < 3 ? navBtn("Далее", next, true) : navBtn("Отправить заявку", handleSubmit, true)}
      </div>

      <SocialFooter style={{ marginTop: 48, paddingBottom: 20 }} />
    </div>
  );
};

// ─── SUCCESS ───

const Success = ({ type, onBack }) => (
  <div style={{
    minHeight: "100vh", display: "flex", flexDirection: "column",
    alignItems: "center", justifyContent: "center",
    padding: "40px 20px", textAlign: "center",
  }}>
    <div style={{
      width: 80, height: 80, borderRadius: "50%",
      background: C.successDim, display: "flex",
      alignItems: "center", justifyContent: "center",
      marginBottom: 24, fontSize: 36, color: C.success,
    }}>✓</div>
    <h1 style={{
      fontFamily: "Unbounded", fontSize: 28, fontWeight: 800,
      color: C.white, margin: "0 0 12px",
    }}>Заявка отправлена</h1>
    <p style={{
      fontFamily: "Inter", fontSize: 16, color: C.textDim,
      margin: "0 0 8px", lineHeight: 1.5, maxWidth: 400,
    }}>
      {type === "artist"
        ? "Мы получили твою заявку на выступление. Свяжемся в ближайшее время для уточнения деталей."
        : "Мы получили заявку на активность. Куратор свяжется с тобой для обсуждения."
      }
    </p>
    <p style={{
      fontFamily: "Unbounded", fontSize: 11, color: C.accent,
      margin: "0 0 32px", letterSpacing: "0.15em",
    }}>✳ ВСЕ ДОРОГИ ВЕДУТ В ЕЛКИНО</p>
    <button onClick={onBack} style={{
      padding: "12px 32px",
      fontFamily: "Unbounded", fontSize: 13, fontWeight: 600,
      color: C.text, background: C.surface,
      border: `1px solid ${C.border}`, borderRadius: 10,
      cursor: "pointer", transition: "all 0.2s",
    }}
      onMouseEnter={e => { e.target.style.borderColor = C.borderHover; e.target.style.transform = "translateY(-2px)"; }}
      onMouseLeave={e => { e.target.style.borderColor = C.border; e.target.style.transform = "none"; }}
    >На главную</button>
    <a href="https://elkinogang.ru/" target="_blank" rel="noopener noreferrer" style={{
      display: "inline-block", marginTop: 10, padding: "12px 32px",
      fontFamily: "Unbounded", fontSize: 13, fontWeight: 600,
      color: C.accent, background: "none",
      border: `1px solid ${C.accent}`, borderRadius: 10,
      textDecoration: "none", transition: "all 0.2s",
    }}
      onMouseEnter={e => { e.currentTarget.style.background = C.accent; e.currentTarget.style.color = C.bg; }}
      onMouseLeave={e => { e.currentTarget.style.background = "none"; e.currentTarget.style.color = C.accent; }}
    >На сайт</a>
    <SocialFooter style={{ marginTop: 36 }} />
  </div>
);

// ─── APP ───

function App() {
  const [view, setView] = useState("landing");
  const [submitType, setSubmitType] = useState(null);
  const deadline = new Date("2026-05-15T23:59:59").getTime();
  const isExpired = Date.now() > deadline;

  const handleSubmit = (type, data) => {
    fetch("https://script.google.com/macros/s/AKfycby_lqK45HRjruBQuRnJ6zN-joFUg9p7P2FNvbWErx9Os_3GKHnuzvlmKJ7NIYVAPGCB/exec", {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ _type: type, _formData: data }),
    }).catch(function(){});
    setSubmitType(type);
    setView("success");
  };

  const handleSelect = (v) => {
    if (isExpired) return;
    setView(v);
  };

  return (
    <div style={{ background: C.bg, color: C.text, minHeight: "100vh" }}>
      <style>{FONTS_CSS}</style>
      {view === "landing" && <Landing onSelect={handleSelect} expired={isExpired} />}
      {view === "artist" && !isExpired && <ArtistForm onBack={() => setView("landing")} onSubmit={d => handleSubmit("artist", d)} />}
      {view === "activity" && !isExpired && <ActivityForm onBack={() => setView("landing")} onSubmit={d => handleSubmit("activity", d)} />}
      {view === "success" && <Success type={submitType} onBack={() => setView("landing")} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
